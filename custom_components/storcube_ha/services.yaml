set_power:
  name: Régler la puissance de sortie
  description: >-
    Définit la consigne de puissance de sortie de la batterie StorCube.
  fields:
    power:
      name: Puissance
      description: Consigne de puissance en watts.
      required: true
      example: 300
      selector:
        number:
          min: 0
          max: 800
          step: 1
          unit_of_measurement: W
          mode: slider
    device_id:
      name: Identifiant d'équipement
      description: >-
        Identifiant StorCube à piloter. Obligatoire uniquement si plusieurs
        entrées sont configurées.
      required: false
      example: "ABC123456789"
      selector:
        text:

set_threshold:
  name: Régler le seuil de décharge
  description: >-
    Définit le niveau de charge en dessous duquel la batterie cesse de se
    décharger.
  fields:
    threshold:
      name: Seuil
      description: Seuil de décharge en pourcentage.
      required: true
      example: 20
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    device_id:
      name: Identifiant d'équipement
      description: >-
        Identifiant StorCube à piloter. Obligatoire uniquement si plusieurs
        entrées sont configurées.
      required: false
      example: "ABC123456789"
      selector:
        text:

check_firmware:
  name: Vérifier le firmware
  description: >-
    Interroge l'API StorCube et retourne la version installée, la dernière
    version disponible et les notes de version.
  fields:
    device_id:
      name: Identifiant d'équipement
      description: >-
        Identifiant StorCube à interroger. Obligatoire uniquement si plusieurs
        entrées sont configurées.
      required: false
      example: "ABC123456789"
      selector:
        text:
